<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}UDN NBA 焦點新聞{% endblock %}</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: -apple-system, "PingFang TC", "Noto Sans TC", sans-serif;
           max-width: 900px; margin: 0 auto; padding: 24px; color: #222; }
    h1 { margin-bottom: 8px; }
    a { color: #0366d6; text-decoration: none; }
    a:hover { text-decoration: underline; }
    .news-card { display: flex; gap: 16px; padding: 16px; border: 1px solid #eee;
                 border-radius: 8px; margin-bottom: 12px; cursor: pointer;
                 transition: box-shadow .2s; }
    .news-card:hover { box-shadow: 0 2px 12px rgba(0,0,0,.08); }
    .news-card img { width: 160px; height: 107px; object-fit: cover; border-radius: 4px; flex-shrink: 0; }
    .news-card .meta { color: #666; font-size: 13px; margin-top: 4px; }
    .news-card .caption { color: #555; font-size: 14px; margin-top: 6px; }
    .pagination { display: flex; gap: 8px; justify-content: center; margin-top: 20px; }
    .pagination button { padding: 8px 16px; border: 1px solid #ccc; background: #fff;
                         border-radius: 4px; cursor: pointer; }
    .pagination button:disabled { opacity: .4; cursor: not-allowed; }
    .detail-img { width: 100%; max-height: 480px; object-fit: cover; border-radius: 8px; }
    .detail-meta { color: #666; margin: 8px 0 20px; font-size: 14px; }
    .detail-content { line-height: 1.8; white-space: pre-wrap; }
    .status { color: #888; text-align: center; padding: 40px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #2d7a2d; color: #fff;
             padding: 12px 20px; border-radius: 6px; opacity: 0; transition: opacity .3s; }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
